<!DOCTYPE html>
<html>
<head>
<title>Login</title>
<style>
body{
    margin:0;
    padding:0;
    font-family:Arial, sans-serif;

	background-image:url('/images/buss.jpg');
	background-size:cover;
		    background-repeat:no-repeat;
		    background-position:center;
		    background-attachment:fixed;
    height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;
}
.container{

    background:white;

    width:350px;

    padding:30px;

    border-radius:15px;

    box-shadow:0 0 20px rgba(0,0,0,0.2);

    text-align:center;
}

h2{
    color:#2196F3;
    margin-bottom:20px;
}

input{

    width:90%;

    padding:12px;

    margin:10px 0;

    border:1px solid #ccc;

    border-radius:5px;
}

button{

    width:100%;

    padding:12px;

    background:#2196F3;

    color:white;

    border:none;

    border-radius:5px;

    cursor:pointer;

    font-size:16px;
}

button:hover{

    background:#1976D2;
}

a{
    text-decoration:none;
}

</style>
</head>
<body>

	<div class="container">

	<h2>User Login</h2>

	<form action="/loginUser" method="post">

	    <input type="email"
	           name="email"
	           placeholder="Enter Email"
	           required>

	    <input type="password"
	           name="password"
	           placeholder="Enter Password"
	           required>

	    <button type="submit">
	        Login
	    </button>

	</form>

	<br>

	<a href="/registerPage">
	    New User? Register Here
	</a>

	</div>
	<script th:if="${error}">
	    alert('[[${error}]]');
	</script>

</body>
</html>
