<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Bus Pass Renewal</title><
<style>
body{
    background-image:url('/images/Rbus.jpg');
    background-size:cover;
    background-repeat:no-repeat;
    background-position:center;
    background-attachment:fixed;
}

h1{
	text-align:center;
    color:#003366;
}

form{
    width:700px;
    margin:30px auto;
    background:rgba(255,255,255,0.90);
    padding:25px;
    border-radius:10px;
    box-shadow:0 0 10px gray;
}

label{
    display:inline-block;
    width:180px;
    font-weight:bold;
}

input,
select{
    width:250px;
    height:32px;
    box-sizing:border-box;
}

button{
    background-color:#0066cc;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
    padding:10px 20px;
    margin-left:185px;
}

button:hover{
    background-color:#004999;
}

a{
    color:red;
    text-decoration:none;
}

a:hover{
    text-decoration:underline;
}

#studentSection{
    margin-left:0;
}
.required{
    color:red;
}
.password-container{
    position:relative;
    display:inline-block;
}

.password-container input{
    width:220px;
    padding-right:35px;
}

.password-container span{
    position:absolute;
    right:10px;
    top:50%;
    transform:translateY(-50%);
    cursor:pointer;
    user-select:none;
}
</style>
<script>
	function toggleFields() {

	    let userType =
	        document.getElementById("userType").value;

	    let studentSection =
	        document.getElementById("studentSection");

	    let institutionName =
	        document.querySelector("[name='institutionName']");

	    let classLevel =
	        document.querySelector("[name='classLevel']");

	    if(userType === "Student") {

	        studentSection.style.display = "block";

	        institutionName.required = true;
	        classLevel.required = true;

	    } else {

	        studentSection.style.display = "none";

	        institutionName.required = false;
	        classLevel.required = false;
	    }
	}

	window.onload = function() {
	    toggleFields();
	};
function togglePreviousPass() {

    let type =
        document.getElementById(
            "applicationType").value;

    let section =
        document.getElementById(
            "previousPassSection");

    if(type === "Renewal") {

        section.style.display = "block";

    } else {

        section.style.display = "none";
    }
}

function calculateAge() {

    let dob =
        document.getElementById("dob").value;

    if(dob === "") return;

    let birthDate =
        new Date(dob);

    let today =
        new Date();

    let age =
        today.getFullYear() -
        birthDate.getFullYear();

    let monthDiff =
        today.getMonth() -
        birthDate.getMonth();

    if(monthDiff < 0 ||
       (monthDiff === 0 &&
        today.getDate() < birthDate.getDate())) {

        age--;
    }

    document.getElementById("age").value = age;
}	
function togglePassword() {

	    let passwordField =
	        document.getElementById("password");

	    if(passwordField.type === "password") {

	        passwordField.type = "text";

	    } else {

	        passwordField.type = "password";
	    }
	}

	


</script>
</head>

<body>
	<div class="container">

<h1>Online Bus Pass Renewal System</h1>
<form action="/register"
      method="post"
      enctype="multipart/form-data">

    <label>Name :<span class="required">*</span></label>
    <input type="text" name="name" required>
    <br><br>

    <label>Date of Birth :<span class="required">*</span></label>
	<input type="date"
		       id="dob"
		       name="dateOfBirth"
		       onchange="calculateAge()"
		       required><br><br>
    

    <label>Age :<span class="required">*</span></label>
	<input type="number"
	       id="age"
	       name="age"
	       readonly
	       required>

	<br><br>
	

    <label>Email :<span class="required">*</span></label>
    <input type="email" name="email" required>
    <br><br>

    <label>Mobile :</label>
    <input type="tel"
           name="mobile"
           pattern="[0-9]{10}"
           maxlength="10"
           required
           title="Mobile number must be exactly 10 digits">
    <br><br>

    <label>Password :<span class="required">*</span></label>
	<div class="password-container">

	    <input type="password"
	           id="password"
	           name="password"
	           required>

	    <span onclick="togglePassword()">👁️</span>

	</div>
	<br><br>
    <label>User Type :<span class="required">*</span></label>
    <select id="userType"
            name="userType"
            onchange="toggleFields()">
        <option value="Student">Student</option>
        <option value="Passenger">Passenger</option>
    </select>

    <br><br>

    <div id="studentSection">

        <label>Institution Type :</label>
        <select name="institutionType">
            <option value="School">School</option>
            <option value="College">College</option>
        </select>

        <br><br>

        <label>Institution Name :<span class="required">*</span></label>
        <input type="text"
               name="institutionName"
               required>

        <br><br>

        <label>Institution Area :</label>
        <input type="text"
               name="institutionArea">

        <br><br>

        <label>Institution Code :</label>
        <input type="text"
               name="institutionCode">

        <br><br>

        <label>Class / Year :<span class="required">*</span></label>
        <input type="number"
               name="classLevel"
               required>

        <br><br>

    </div>

    <label>Pass Type :</label>
    <select name="passType">
        <option value="Monthly">Monthly</option>
        <option value="Quarterly">Quarterly</option>
		<option value="Half Yearly">Half Yearly</option>
    </select>

    <br><br>

    <label>Photo :<span class="required">*</span></label>
    <input type="file"
           name="photofile"
           accept="image/*"
           required>

    <br><br>

    <button type="submit">Register</button>

</form>
<div style="text-align:center;">

    <a href="/login"><b>Already Registered?<b></a>

    &nbsp;

    <a href="/login"><b>Login Here<b></a>

    <br><br>

    <a href="/adminLogin"><b>Admin Login</b></a>

</div>


</body>
</html>
