<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Renew Bus Pass</title>
<style>

body{
    font-family: Arial, sans-serif;
    background-image:url('/images/bus4.jpg');
    background-size:cover;
    background-repeat:no-repeat;
    background-position:center;
    background-attachment:fixed;
}

h1{
    text-align:center;
    color:#003366;
    margin-bottom:20px;
}

form{
    width:600px;
    margin:30px auto;
    background:rgba(255,255,255,0.90);
    padding:25px;
    border-radius:10px;
    box-shadow:0 0 10px gray;
}

label{
    display:inline-block;
    width:180px;
    font-weight:bold;
}

input,
select{
    width:250px;
    height:32px;
    box-sizing:border-box;
}

button{
    background-color:#0066cc;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
    padding:10px 20px;
}

button:hover{
    background-color:#004999;
}

.dashboard-link{
    display:inline-block;
    background-color:#0066cc;
    color:white;
    padding:10px 20px;
    border-radius:5px;
    text-decoration:none;
    font-weight:bold;
}

.dashboard-link:hover{
    background-color:#004999;
    text-decoration:none;
}
</style>

</head>

<body>

<h1>Bus Pass Renewal</h1>

<form action="/submitRenewal" method="post">

    <label>Previous Pass ID:</label>
    <input type="text"
           name="passNumber"
           required>

    <br><br>

    <label>Pass Type:</label>
    <select name="passType">
        <option value="Monthly">Monthly</option>
        <option value="Quarterly">Quarterly</option>
        <option value="Half-Yearly">Half-Yearly</option>
    </select>

    <br><br>

	<div style="text-align:center; margin-top:20px;">

	    <button type="submit">
	        <b>Renew Pass</b>
	    </button>

	    &nbsp;&nbsp;

	    <a href="/dashboard" class="dashboard-link">
	        Back to Dashboard
	    </a>

	</div>

</body>
</html>
